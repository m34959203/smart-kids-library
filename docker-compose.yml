services:
  app:
    build: .
    ports:
      - "3003:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/smart_kids_library
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-in-production}
      - NEXTAUTH_URL=http://100.118.110.5:3003
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - AI_DISABLED=${AI_DISABLED:-0}
      - AI_USD_CAP_DAILY=${AI_USD_CAP_DAILY:-0.50}
      - AI_USD_CAP_TOTAL=${AI_USD_CAP_TOTAL:-4.50}
      - AI_USD_CAP_PERIOD_START=${AI_USD_CAP_PERIOD_START:-2026-04-30}
      - AI_USER_RPD=${AI_USER_RPD:-40}
      - AI_USER_RPM=${AI_USER_RPM:-5}
      - AI_USER_USD_DAILY=${AI_USER_USD_DAILY:-0.05}
      - AI_ANON_RPD=${AI_ANON_RPD:-12}
      - AI_ANON_RPM=${AI_ANON_RPM:-3}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHANNEL_ID=${TELEGRAM_CHANNEL_ID:-}
      - INSTAGRAM_ACCESS_TOKEN=${INSTAGRAM_ACCESS_TOKEN:-}
      - INSTAGRAM_ACCOUNT_ID=${INSTAGRAM_ACCOUNT_ID:-}
      - NEXT_PUBLIC_APP_URL=http://100.118.110.5:3003
      - GEMINI_DAILY_TOKEN_LIMIT=1500000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./public/uploads/books:/app/public/uploads/books
      - ./public/uploads/covers:/app/public/uploads/covers
      - ./scripts/books-data.json:/app/scripts/books-data.json:ro
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=smart_kids_library
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    ports:
      - "5440:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
